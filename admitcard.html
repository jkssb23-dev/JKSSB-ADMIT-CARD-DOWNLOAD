<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Upload Admit Card</title>

<style>
body{
font-family:Arial;
background:#f2f2f2;
text-align:center;
padding:20px;
}
img{
width:95%;
max-width:900px;
display:none;
margin-top:20px;
border:1px solid #000;
}
button{
padding:12px 20px;
background:#0056A6;
color:white;
border:none;
border-radius:5px;
margin-top:20px;
}
</style>

</head>
<body>

<h2>Junior Assistant Skill Test</h2>

<input type="file" id="upload" accept="image/*">

<br><br>

<img id="preview">

<br>

<button onclick="window.print()">Print Admit Card</button>

<script>
document.getElementById("upload").onchange=function(e){
const file=e.target.files[0];
if(file){
document.getElementById("preview").src=URL.createObjectURL(file);
document.getElementById("preview").style.display="block";
}
}
</script>

</body>
</html>
